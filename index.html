<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Health Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Segoe UI;
background:#0f172a;
margin:0;
padding:40px;
color:white;
}

.container{
max-width:900px;
margin:auto;
text-align:center;
}

.header{
font-size:32px;
margin-bottom:10px;
color:#60a5fa;
}

.sub{
color:#94a3b8;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#020617;
padding:25px;
border-radius:14px;
border:1px solid #1e293b;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
border-color:#334155;
}

.card h3{
margin-top:0;
}

.btn{
display:block;
text-align:center;
margin-top:15px;
padding:12px;
border-radius:8px;
background:#2563eb;
color:white;
text-decoration:none;
font-weight:bold;
}

.footer{
margin-top:40px;
font-size:13px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<div class="header">Daily Health Tracker</div>

<div class="sub">
Track daily health routines and view insights
</div>

<div class="grid">

<div class="card">

<h3>Daily Health Form</h3>
<p>Submit today's health activities.</p>

<a class="btn"
href="https://script.google.com/macros/s/AKfycbyWGLXxN3kMgsMOQzVw8oSnTLMdqFWAg0s5KjPC0ei7993ldr4ZoePQDuG_DWlY2wxL/exec?page=form">
Open Form
</a>

</div>


<div class="card">

<h3>Health Dashboard</h3>
<p>View health trends and analytics.</p>

<a class="btn"
href="https://script.google.com/macros/s/AKfycbyWGLXxN3kMgsMOQzVw8oSnTLMdqFWAg0s5KjPC0ei7993ldr4ZoePQDuG_DWlY2wxL/exec?page=dashboard">
Open Dashboard
</a>

</div>

</div>

<div class="footer">
Health Monitoring System
</div>

</div>

</body>
</html>
